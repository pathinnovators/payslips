<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Bright Path Innovators Payroll Portal</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
padding:0;
}

.header{
background:#1e2a38;
color:white;
text-align:center;
padding:25px;
}

.logo{
width:90px;
margin-bottom:10px;
}

.company{
font-size:26px;
font-weight:bold;
}

.portal{
font-size:16px;
opacity:0.9;
}

.container{
width:420px;
margin:60px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
text-align:center;
}

input{
width:95%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:6px;
}

button{
width:100%;
padding:12px;
background:#2c3e50;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#34495e;
}

.result{
margin-top:20px;
}

.captcha{
font-size:22px;
background:#eee;
padding:10px;
letter-spacing:4px;
margin-top:10px;
}

.footer{
text-align:center;
margin-top:40px;
color:#777;
font-size:13px;
}

</style>

</head>

<body>

<div class="header">

<img src="logo.png" class="logo">

<div class="company">
Bright Path Innovators Pvt Ltd
</div>

<div class="portal">
Employee HR Payroll Portal
</div>

</div>

<div class="container">

<h3>Access Your Payslip</h3>

<input type="text" id="empID" placeholder="Enter Employee ID (Example: BPI-021)">

<input type="month" id="month">

<div class="captcha" id="captcha"></div>

<input type="text" id="captchaInput" placeholder="Enter CAPTCHA">

<button onclick="getPayslip()">View Payslip</button>

<div class="result" id="result"></div>

</div>

<div class="footer">
© 2026 Bright Path Innovators Pvt Ltd
</div>

<script>

let captchaCode;

const payslips=[

{
id:"BPI-006",
month:"2025-12",
link:"https://drive.google.com/file/d/FILEID1/view"
},

{
id:"BPI-011",
month:"2025-12",
link:"https://drive.google.com/file/d/FILEID2/view"
},

{
id:"BPI-019",
month:"2025-12",
link:"https://drive.google.com/file/d/FILEID3/view"
},

{
id:"BPI-021",
month:"2025-12",
link:"https://drive.google.com/file/d/1aQpc-MhAiA51JbvNh5JjiqN4hrU0-sT8/view?usp=sharing"
},

{
id:"BPI-020",
month:"2025-12",
link:"https://drive.google.com/file/d/FILEID2/view"
},

{
id:"BPI-024",
month:"2025-12",
link:"https://drive.google.com/file/d/1A24AflMMbR26hL0qa1PaDZXUsMM-RLeU/view?usp=sharing"
},

{
id:"BPI-023",
month:"2025-12",
link:"https://drive.google.com/file/d/1fuBlHPZXhpJ1UfuHf9iNs36XAx9DtR4z/view?usp=sharing"
}

];

function generateCaptcha(){

captchaCode=Math.floor(1000+Math.random()*9000)

document.getElementById("captcha").innerText=captchaCode

}

generateCaptcha()

function getPayslip(){

let emp=document.getElementById("empID").value.trim()
let month=document.getElementById("month").value
let captchaInput=document.getElementById("captchaInput").value
let result=document.getElementById("result")

if(captchaInput != captchaCode){

alert("Incorrect CAPTCHA")

generateCaptcha()

return

}

let found=payslips.find(p=>p.id===emp && p.month===month)

if(found){

result.innerHTML=
`<a href="${found.link}" target="_blank">
<button>Download Payslip</button>
</a>`

}

else{

result.innerHTML="<p style='color:red'>Payslip not found. Please contact HR.</p>"

}

}

</script>

</body>
</html>
