<style>

body{
  font-family: 'Segoe UI', Tahoma, sans-serif;
  background: linear-gradient(135deg,#eef2f7,#dfe9f3);
  margin:0;
}

/* HEADER */
.header{
  background:#240357;
  color:white;
  text-align:center;
  padding:25px;
}

.logo{
  width:100px;
}

.company{
  font-size:30px;
  font-weight:bold;
}

.portal{
  font-size:14px;
  opacity:0.8;
}

/* CARD */
.container{
  width:400px;
  margin:60px auto;
  background:white;
  padding:30px;
  border-radius:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
  text-align:center;
}

/* INPUTS */
input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:1px solid #ccc;
  border-radius:8px;
  font-size:14px;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  background:#d60d0d;
  color:white;
  border:none;
  border-radius:8px;
  font-size:15px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#34495e;
}

/* CAPTCHA */
.captcha-box{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:10px;
}

.captcha{
  background:#eee;
  padding:10px 20px;
  font-size:20px;
  letter-spacing:3px;
  border-radius:6px;
}

.refresh{
  cursor:pointer;
  font-size:12px;
  color:#3498db;
}

/* RESULT */
.result{
  margin-top:20px;
}

/* FOOTER */
.footer{
  text-align:center;
  margin-top:40px;
  color:#777;
  font-size:13px;
}

</style>

</head>

<button onclick="accessPayslip()">View Payslip</button>

<div class="result" id="result"></div>

/* ACCESS FUNCTION */
function accessPayslip(){

  let emp = document.getElementById("empID").value.trim();
  let month = document.getElementById("month").value;
  let captchaInput = document.getElementById("captchaInput").value;
  let result = document.getElementById("result");

  if(captchaInput != captchaCode){
    alert("Incorrect CAPTCHA");
    generateCaptcha();
    return;
  }

  let found = payslips.find(p => p.id === emp && p.month === month);

  if(found){
    result.innerHTML = `
      <a href="${found.link}" target="_blank">
        <button>Download Payslip</button>
      </a>
    `;
  } else {
    result.innerHTML = "<p style='color:red'>Payslip not found. Contact HR.</p>";
  }

}
